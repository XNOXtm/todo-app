<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasked</title>
</head>
<body>
    <header>
        <h1>Tasked</h1>
    </header>
    <main>
        <div id="sidebar">
            <h1>My Projects</h1>
            <button id="add-project"><p>+ Add Project</p></button>
            <ul id="project-list">
                <li class="project">
                    <div class="project-name">Project 1</div>
                    <button class="delete-project">X</button>
                </li>
            </ul>
        </div>
        <div id="content">
            <div id="content-header">
                <div class="project-name">Project 1</div>
                <button id="add-todo">+ Add Todo</button>
            </div>
            <div id="todo-section">
                <ul class="todo-list">
                    <li class="todo">
                        <button class="checkbox">O</button>
                        <div class="title">task1</div>
                        <div class="description">detail description</div>
                        <div class="due-date">10-06-2026</div>
                        <button class="delete-todo">delete</button>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</body>
</html>
